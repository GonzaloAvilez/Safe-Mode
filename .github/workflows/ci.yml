name: CI

on:
  pull_request:
    branches: [master, preview]
  push:
    branches: [master, preview]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Dummy values, not secrets — next build evaluates supabase.ts/openai.ts at the
      # module level while collecting page data, so these two clients must construct
      # without throwing even though no route actually calls out to either service
      # during a build. Real secrets live in Vercel's own env, not here.
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      OPENAI_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      # Generates .next/dev/types/routes.d.ts, which declares the global RouteContext
      # type (used by src/app/api/entries/[id]/resonate/route.ts). Locally this happens
      # implicitly via `next dev`/`next build`, but a fresh CI checkout has no .next dir
      # yet — skipping this step makes tsc fail with "Cannot find name 'RouteContext'".
      - run: npx next typegen
      - run: npm run lint
      - run: npx tsc --noEmit
      # Informational only — no coverage.thresholds set in vitest.config.ts, so a low
      # or 0% number for any file logs here but never fails the build. Scoped to
      # src/lib only; see vitest.config.ts for why src/app isn't included.
      - run: npm run test:coverage
      - run: npm run build
